        <script>
document.addEventListener('DOMContentLoaded', function() {
  // Typewriter effect setup
const text = "thoughts and work in my spare time.";
const typingElement = document.getElementById('typewriter');
const cursorElement = document.getElementById('cursor');
let index = 0;


  function typeWriter() {
      if (index < text.length) {
          cursorElement.insertAdjacentText('beforebegin', text.charAt(index));
          index++;
          setTimeout(typeWriter, 50); // Adjust speed here
      }
  }
  typeWriter(); // Start typewriter effect

  // Sidebar toggle setup
  var hamburger = document.querySelector('.hamburger');
  var sidebar = document.querySelector('.sidebar');

  hamburger.addEventListener('click', function() {
      sidebar.classList.toggle('is-active');
  });
});
